<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QWERTY MIDI Visualizer ✨ Audio & Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --active-color: #10b981;
            --active-color-dark: #059669;
        }

        body { 
            font-family: 'JetBrains+Mono', monospace; 
            background-color: #020617; 
            color: #f8fafc;
            overflow-x: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        canvas {
            touch-action: none;
            cursor: crosshair;
        }

        .control-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .progress-container {
            height: 10px;
            background: #1e293b;
            cursor: pointer;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            width: 0%;
        }

        .practice-indicator {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">

    <div class="max-w-6xl w-full space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400">
                PIANO PRACTICE
            </h1>
            <p class="text-slate-400 text-sm">Press the matching key to advance the song.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 space-y-4">
                <div class="relative bg-slate-950 rounded-2xl border border-slate-800 shadow-2xl overflow-hidden aspect-video group">
                    <canvas id="visualizer" class="w-full h-full"></canvas>
                    
                    <div id="waitMessage" class="absolute inset-0 flex items-center justify-center bg-black/40 hidden">
                        <div class="bg-slate-900/90 px-6 py-3 rounded-full border border-emerald-500/50 flex items-center gap-3">
                            <span class="w-3 h-3 bg-emerald-500 rounded-full practice-indicator"></span>
                            <span class="text-emerald-400 font-bold tracking-wider">WAITING FOR KEY: <span id="targetKey" class="text-white bg-emerald-600 px-2 py-0.5 rounded ml-2">-</span></span>
                        </div>
                    </div>

                    <div class="absolute bottom-4 left-4 right-4 flex items-center gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button id="playBtn" class="bg-emerald-500 hover:bg-emerald-600 p-3 rounded-full shadow-lg transition-transform active:scale-95">
                            <svg id="playIcon" class="w-6 h-6 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <div id="timeline" class="progress-container flex-grow">
                            <div id="progressBar" class="progress-bar"></div>
                        </div>
                        <span id="timeDisplay" class="text-[10px] font-mono font-bold w-24 text-emerald-400">00:00.000</span>
                    </div>
                </div>

                <div class="control-panel p-6 rounded-2xl grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs uppercase tracking-widest text-slate-500 font-bold">Mode</label>
                        <div class="flex gap-2">
                            <button id="modeAuto" class="flex-1 py-2 rounded bg-slate-800 text-xs font-bold border border-slate-700 text-slate-400 hover:text-white transition-colors">AUTO</button>
                            <button id="modePractice" class="flex-1 py-2 rounded bg-emerald-500 text-xs font-bold border border-emerald-400 text-white transition-colors">PRACTICE</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs uppercase tracking-widest text-slate-500 font-bold">Speed / Transpose</label>
                        <div class="flex flex-col gap-1">
                            <input type="range" id="speed" min="0.1" max="2.0" step="0.1" value="1.0" class="w-full accent-emerald-500">
                            <input type="range" id="transpose" min="-24" max="24" value="0" class="w-full accent-emerald-500">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs uppercase tracking-widest text-slate-500 font-bold">Zoom (Scroll)</label>
                        <div class="flex items-center gap-3">
                            <input type="range" id="zoom" min="100" max="1500" value="400" class="flex-grow accent-emerald-500">
                            <span id="zoomValue" class="text-emerald-400 font-bold w-12 text-center text-xs">400</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-4">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col h-full min-h-[400px]">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xs font-bold uppercase text-slate-500 tracking-tighter">Keyboard Text</h2>
                        <button id="copyBtn" class="text-[10px] bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded-md transition-colors">COPY</button>
                    </div>
                    <div id="resultArea" class="custom-scrollbar overflow-y-auto flex-grow text-emerald-300/80 font-mono text-xs leading-relaxed p-2 select-all">
                        // MIDI data will appear here...
                    </div>
                </div>
                
                <input type="file" id="midiInput" accept=".mid,.midi" class="hidden">
                <button onclick="document.getElementById('midiInput').click()" class="w-full py-4 bg-gradient-to-r from-slate-800 to-slate-900 border border-slate-700 rounded-2xl font-bold hover:border-emerald-500/50 transition-all active:scale-[0.98]">
                    UPLOAD MIDI FILE
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Key Map Data ---
        const keyMapData = {
            "1": "C1", "2": "D1", "3": "E1", "4": "F1", "5": "G1", "6": "A1", "7": "B1",
            "8": "C2", "9": "D2", "0": "E2", "q": "F2", "i": "G2", "w": "A2", "o": "B2",
            "e": "C3", "p": "D3", "r": "E3", "a": "F3", "t": "G3", "y": "A3", "u": "B3",
            "s": "C4", "d": "D4", "f": "E4", "g": "F4", "h": "G4", "j": "A4", "k": "B4",
            "l": "C5", "z": "D5", "x": "E5", "c": "F5", "v": "G5", "b": "A5", "n": "B5", 
            "m": "C6", 
            "!": "C#1", "@": "D#1", "$": "F#1", "%": "G#1", "^": "A#1", 
            "*": "C#2", "(": "D#2", "I": "F#2", "O": "G#2", "P": "A#2",
            "T": "C#3", "Y": "D#3", "S": "F#3", "D": "G#3", "G": "A#3",
            "H": "C#4", "J": "D#4", "L": "F#4", "Z": "G#4", "C": "A#4",
            "V": "C#5", "B": "D#5", "N": "F#5", "M": "G#5", ">": "A#5"
        };

        // Inverse map for finding character by pitch
        const pitchToChar = {};
        Object.entries(keyMapData).forEach(([char, pitch]) => { pitchToChar[pitch] = char; });

        // --- Audio Engine ---
        const sampler = new Tone.Sampler({
            urls: {
                A0: "A0.mp3", C1: "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", A1: "A1.mp3",
                C2: "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", A2: "A2.mp3",
                C3: "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", A3: "A3.mp3",
                C4: "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", A4: "A4.mp3",
                C5: "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", A5: "A5.mp3",
                C6: "C6.mp3"
            },
            release: 1,
            baseUrl: "https://tonejs.github.io/audio/salamander/"
        }).toDestination();

        // --- Core Variables ---
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const midiInput = document.getElementById('midiInput');
        const playBtn = document.getElementById('playBtn');
        const resultArea = document.getElementById('resultArea');
        const progressBar = document.getElementById('progressBar');
        const timeline = document.getElementById('timeline');
        const timeDisplay = document.getElementById('timeDisplay');
        const waitMessage = document.getElementById('waitMessage');
        const targetKeySpan = document.getElementById('targetKey');
        
        const transposeInput = document.getElementById('transpose');
        const speedInput = document.getElementById('speed');
        const zoomInput = document.getElementById('zoom');
        const modeAuto = document.getElementById('modeAuto');
        const modePractice = document.getElementById('modePractice');

        let currentMidi = null;
        let isPlaying = false;
        let isPracticeMode = true;
        let startTime = 0;
        let pauseTime = 0;
        let animationId = null;
        let midiNotes = [];
        let nextNoteIndex = 0;

        function resize() {
            canvas.width = canvas.parentElement.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.parentElement.clientHeight * window.devicePixelRatio;
            if (!isPlaying) draw(pauseTime);
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Mode Switching ---
        modeAuto.onclick = () => {
            isPracticeMode = false;
            modeAuto.className = "flex-1 py-2 rounded bg-emerald-500 text-xs font-bold border border-emerald-400 text-white transition-colors";
            modePractice.className = "flex-1 py-2 rounded bg-slate-800 text-xs font-bold border border-slate-700 text-slate-400 hover:text-white transition-colors";
            waitMessage.classList.add('hidden');
        };
        modePractice.onclick = () => {
            isPracticeMode = true;
            modePractice.className = "flex-1 py-2 rounded bg-emerald-500 text-xs font-bold border border-emerald-400 text-white transition-colors";
            modeAuto.className = "flex-1 py-2 rounded bg-slate-800 text-xs font-bold border border-slate-700 text-slate-400 hover:text-white transition-colors";
        };

        // --- MIDI Processing ---
        midiInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
                const midi = new Midi(event.target.result);
                currentMidi = midi;
                processMidi();
                resetPlayback();
            };
            reader.readAsArrayBuffer(file);
        });

        function midiToPitch(midi) {
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const octave = Math.floor(midi / 12) - 1;
            const name = notes[midi % 12];
            return name + octave;
        }

        function processMidi() {
            if (!currentMidi) return;
            const transpose = parseInt(transposeInput.value);
            midiNotes = [];
            let textOutput = "";

            currentMidi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    const transposedPitchValue = note.midi + transpose;
                    const pitchStr = midiToPitch(transposedPitchValue);
                    const char = pitchToChar[pitchStr] || "?";
                    
                    midiNotes.push({
                        time: note.time,
                        duration: note.duration,
                        midi: transposedPitchValue,
                        pitch: pitchStr,
                        char: char,
                        velocity: note.velocity,
                        played: false
                    });
                });
            });

            midiNotes.sort((a, b) => a.time - b.time);
            resultArea.innerText = midiNotes.map(n => n.char).join("");
        }

        // --- Rendering ---
        function draw(currentTime) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const zoom = parseFloat(zoomInput.value);
            const speed = parseFloat(speedInput.value);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const duration = currentMidi ? currentMidi.duration : 1;
            const percent = (currentTime / duration) * 100;
            progressBar.style.width = `${Math.min(100, percent)}%`;
            
            const mins = Math.floor(currentTime / 60).toString().padStart(2, '0');
            const secs = Math.floor(currentTime % 60).toString().padStart(2, '0');
            const ms = Math.floor((currentTime % 1) * 1000).toString().padStart(3, '0');
            timeDisplay.innerText = `${mins}:${secs}.${ms}`;

            drawGrid(currentTime, zoom, speed, centerX);

            if (!midiNotes.length) return;

            midiNotes.forEach(note => {
                const xOffset = (note.time - currentTime) * zoom * speed;
                const x = centerX + xOffset;
                const y = centerY + (60 - note.midi) * 15;

                if (x > -300 && x < canvas.width + 300) {
                    const isHitting = Math.abs(xOffset) < 3;
                    const alpha = Math.max(0, 1 - Math.abs(xOffset) / (canvas.width / 1.5));

                    ctx.fillStyle = isHitting ? `#34d399` : (note.time < currentTime ? `rgba(16, 185, 129, 0.2)` : `rgba(30, 41, 59, ${alpha * 0.9})`);
                    
                    if (isHitting) {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = "#10b981";
                    }

                    const width = Math.max(10, note.duration * zoom * speed);
                    drawRoundedRect(ctx, x, y - 6, width, 12, 4);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    if (alpha > 0.4) {
                        ctx.font = `${isHitting ? 'bold 14px' : '12px'} JetBrains Mono`;
                        ctx.fillStyle = isHitting ? '#fff' : `rgba(148, 163, 184, ${alpha})`;
                        ctx.textAlign = "center";
                        ctx.fillText(note.char.toUpperCase(), x + 10, y - 16);
                    }
                }
            });

            ctx.strokeStyle = "rgba(16, 185, 129, 0.5)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height);
            ctx.stroke();
        }

        function drawGrid(currentTime, zoom, speed, centerX) {
            const step = zoom > 500 ? 0.5 : 1;
            const startSec = Math.floor((currentTime - (centerX / (zoom * speed))) / step) * step;
            const endSec = Math.ceil((currentTime + (centerX / (zoom * speed))) / step) * step;

            for (let s = startSec; s <= endSec; s += step) {
                const x = centerX + (s - currentTime) * zoom * speed;
                ctx.strokeStyle = s % 1 === 0 ? "rgba(51, 65, 85, 0.3)" : "rgba(51, 65, 85, 0.1)";
                ctx.beginPath();
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
                ctx.stroke();
                if (s % 1 === 0 && zoom > 100) {
                    ctx.fillStyle = "rgba(148, 163, 184, 0.4)";
                    ctx.font = "10px JetBrains Mono";
                    ctx.fillText(s + "s", x + 4, 20);
                }
            }
        }

        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // --- Playback Logic ---
        function animate() {
            if (!isPlaying) return;
            
            let currentTime;
            if (isPracticeMode) {
                // Practice Mode: Stay at pauseTime until key hit
                currentTime = pauseTime;
                const nextNote = midiNotes.find(n => n.time >= currentTime - 0.05 && !n.played);
                
                if (nextNote && nextNote.time <= currentTime + 0.05) {
                    waitMessage.classList.remove('hidden');
                    targetKeySpan.innerText = nextNote.char.toUpperCase();
                    draw(currentTime);
                    animationId = requestAnimationFrame(animate);
                    return; // PAUSE time here
                } else {
                    waitMessage.classList.add('hidden');
                    // In practice mode, we manually advance time if no immediate note is blocking
                    pauseTime += (0.016 * parseFloat(speedInput.value)); 
                    currentTime = pauseTime;
                }
            } else {
                // Auto Mode: Natural time flow
                const now = performance.now() / 1000;
                currentTime = (now - startTime) * parseFloat(speedInput.value);
                
                // Play sounds in auto mode
                midiNotes.forEach(note => {
                    if (!note.played && note.time <= currentTime) {
                        sampler.triggerAttackRelease(note.pitch, note.duration);
                        note.played = true;
                    }
                });
            }

            draw(currentTime);
            
            if (currentMidi && currentTime > currentMidi.duration) {
                stopPlayback();
            } else {
                animationId = requestAnimationFrame(animate);
            }
        }

        // --- Key Handling ---
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            const pitch = keyMapData[key];
            if (!pitch) return;

            // Always play sound on key press
            sampler.triggerAttackRelease(pitch, "4n");

            if (isPlaying && isPracticeMode) {
                const currentTime = pauseTime;
                // Find notes that match this key at the current time
                const targetNotes = midiNotes.filter(n => 
                    !n.played && 
                    n.char === key && 
                    n.time <= currentTime + 0.1 && 
                    n.time >= currentTime - 0.1
                );

                if (targetNotes.length > 0) {
                    targetNotes.forEach(n => n.played = true);
                    // Small jump forward to next note
                    const remaining = midiNotes.filter(n => !n.played && n.time > currentTime);
                    if (remaining.length > 0) {
                        pauseTime = remaining[0].time;
                    } else {
                        pauseTime += 0.5;
                    }
                }
            }
        });

        function togglePlay() {
            if (!currentMidi) return;
            Tone.start();
            if (isPlaying) {
                if (!isPracticeMode) {
                    pauseTime = (performance.now() / 1000 - startTime) * parseFloat(speedInput.value);
                }
                stopPlayback();
            } else {
                isPlaying = true;
                if (!isPracticeMode) {
                    startTime = performance.now() / 1000 - (pauseTime / parseFloat(speedInput.value));
                }
                document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                animate();
            }
        }

        function stopPlayback() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
            waitMessage.classList.add('hidden');
        }

        function resetPlayback() {
            stopPlayback();
            pauseTime = 0;
            midiNotes.forEach(n => n.played = false);
            draw(0);
        }

        playBtn.onclick = togglePlay;
        
        timeline.onmousedown = (e) => {
            if (!currentMidi) return;
            const rect = timeline.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            pauseTime = percent * currentMidi.duration;
            midiNotes.forEach(n => n.played = n.time < pauseTime);
            if (!isPracticeMode && isPlaying) {
                startTime = performance.now() / 1000 - (pauseTime / parseFloat(speedInput.value));
            }
            draw(pauseTime);
        };

        canvas.onwheel = (e) => {
            e.preventDefault();
            let val = parseInt(zoomInput.value);
            val = e.deltaY < 0 ? Math.min(1500, val + 50) : Math.max(100, val - 50);
            zoomInput.value = val;
            document.getElementById('zoomValue').innerText = val;
            draw(isPracticeMode ? pauseTime : (performance.now()/1000 - startTime) * parseFloat(speedInput.value));
        };

        transposeInput.oninput = (e) => { processMidi(); draw(pauseTime); };
        speedInput.oninput = (e) => { if(isPlaying && !isPracticeMode) {
            const cur = (performance.now()/1000 - startTime) * parseFloat(speedInput.value);
            startTime = performance.now()/1000 - (cur / parseFloat(e.target.value));
        }};
        zoomInput.oninput = (e) => { document.getElementById('zoomValue').innerText = e.target.value; draw(pauseTime); };
        
        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(resultArea.innerText);
            const b = document.getElementById('copyBtn');
            b.innerText = "COPIED!";
            setTimeout(() => b.innerText = "COPY", 2000);
        };
    </script>
</body>
</html>
