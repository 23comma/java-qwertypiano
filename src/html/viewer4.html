<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QWERTY MIDI Visualizer ✨ Enhanced Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --emerald: #10b981;
            --emerald-glow: rgba(16, 185, 129, 0.4);
        }

        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #020617;
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        canvas {
            touch-action: none;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-container {
            height: 6px;
            background: #1e293b;
            cursor: pointer;
            position: relative;
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            width: 0%;
            transition: width 0.1s ease;
        }

        .key-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            padding: 0 8px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            font-weight: bold;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .key-badge.active {
            background: var(--emerald);
            color: white;
            border-color: #34d399;
            box-shadow: 0 0 15px var(--emerald-glow);
            transform: scale(1.1);
        }

        .wait-overlay {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="flex flex-col h-screen">

    <div class="flex-grow flex flex-col p-6 gap-6 max-w-[1920px] mx-auto w-full">
        <!-- Header -->
        <header class="flex justify-between items-center">
            <div>
                <h1
                    class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400">
                    MASTER PIANO
                </h1>
                <p class="text-slate-500 text-xs font-bold tracking-widest uppercase">High Performance MIDI Learning</p>
            </div>
            <div class="flex items-center gap-4">
                <div id="modeDisplay"
                    class="px-4 py-2 rounded-full border border-emerald-500/30 bg-emerald-500/10 text-emerald-400 text-xs font-bold">
                    PRACTICE MODE: CHORD WAIT
                </div>
            </div>
        </header>

        <div class="flex-grow grid grid-cols-12 gap-6 min-h-0">
            <!-- Left Side: Visualizer -->
            <div class="col-span-9 flex flex-col gap-4 min-h-0">
                <div
                    class="relative flex-grow bg-slate-950 rounded-3xl border border-slate-800 shadow-2xl overflow-hidden group">
                    <canvas id="visualizer" class="w-full h-full"></canvas>

                    <!-- Feedback Overlay -->
                    <div id="waitMessage" class="absolute top-8 left-1/2 -translate-x-1/2 wait-overlay hidden">
                        <div class="glass-panel px-8 py-4 rounded-2xl flex flex-col items-center gap-3">
                            <span class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Waiting for
                                Chord</span>
                            <div id="targetKeysContainer" class="flex gap-2">
                                <!-- Target keys will be injected here -->
                            </div>
                        </div>
                    </div>

                    <!-- Bottom Controls Inside Canvas Container -->
                    <div
                        class="absolute bottom-6 left-6 right-6 flex items-center gap-6 p-4 rounded-2xl glass-panel opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-y-2 group-hover:translate-y-0">
                        <button id="playBtn"
                            class="bg-emerald-500 hover:bg-emerald-600 w-12 h-12 flex items-center justify-center rounded-xl shadow-lg transition-all active:scale-95">
                            <svg id="playIcon" class="w-6 h-6 fill-white" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </button>
                        <div class="flex-grow flex flex-col gap-2">
                            <div id="timeline" class="progress-container">
                                <div id="progressBar" class="progress-bar"></div>
                            </div>
                            <div class="flex justify-between text-[10px] font-bold text-slate-500 font-mono">
                                <span id="timeDisplay">00:00.000</span>
                                <span id="durationDisplay">00:00.000</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Bottom Params Panel -->
                <div class="h-32 glass-panel rounded-3xl p-6 grid grid-cols-4 gap-8">
                    <div class="space-y-3">
                        <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Learning
                            Mode</label>
                        <div class="flex p-1 bg-slate-900 rounded-xl">
                            <button id="modeAuto"
                                class="flex-1 py-2 rounded-lg text-[10px] font-bold transition-all">AUTO</button>
                            <button id="modePractice"
                                class="flex-1 py-2 rounded-lg text-[10px] font-bold bg-emerald-500 text-white shadow-lg shadow-emerald-900/20">PRACTICE</button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Playback
                                Speed</label>
                            <span id="speedVal" class="text-[10px] text-emerald-400 font-bold">1.0x</span>
                        </div>
                        <input type="range" id="speed" min="0.1" max="2.0" step="0.1" value="1.0"
                            class="w-full accent-emerald-500">
                    </div>
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <label
                                class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Transpose</label>
                            <span id="transVal" class="text-[10px] text-emerald-400 font-bold">0</span>
                        </div>
                        <input type="range" id="transpose" min="-12" max="12" value="0"
                            class="w-full accent-emerald-500">
                    </div>
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Horizontal
                                Zoom</label>
                            <span id="zoomVal" class="text-[10px] text-emerald-400 font-bold">600</span>
                        </div>
                        <input type="range" id="zoom" min="200" max="1500" value="600"
                            class="w-full accent-emerald-500">
                    </div>
                </div>
            </div>

            <!-- Right Side: Text Area & File -->
            <div class="col-span-3 flex flex-col gap-6 min-h-0">
                <div class="flex-grow flex flex-col glass-panel rounded-3xl p-6 min-h-0">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xs font-bold uppercase text-slate-500 tracking-tighter">Keyboard Text Output
                        </h2>
                        <button id="copyBtn"
                            class="text-[10px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg transition-all">COPY</button>
                    </div>
                    <div id="resultArea"
                        class="custom-scrollbar overflow-y-auto flex-grow text-emerald-400/60 font-mono text-[11px] leading-relaxed p-4 bg-slate-950/50 rounded-2xl border border-white/5 select-all">
                        Upload MIDI to begin...
                    </div>
                </div>

                <input type="file" id="midiInput" accept=".mid,.midi" class="hidden">
                <button onclick="document.getElementById('midiInput').click()"
                    class="py-6 bg-gradient-to-br from-emerald-500 to-cyan-600 text-white rounded-3xl font-black text-sm tracking-widest hover:brightness-110 active:scale-[0.98] transition-all shadow-xl shadow-emerald-500/10">
                    LOAD MIDI FILE
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Key Map Data ---
        const keyMapData = {
            "1": "C1", "2": "D1", "3": "E1", "4": "F1", "5": "G1", "6": "A1", "7": "B1",
            "8": "C2", "9": "D2", "0": "E2", "q": "F2", "i": "G2", "w": "A2", "o": "B2",
            "e": "C3", "p": "D3", "r": "E3", "a": "F3", "t": "G3", "y": "A3", "u": "B3",
            "s": "C4", "d": "D4", "f": "E4", "g": "F4", "h": "G4", "j": "A4", "k": "B4",
            "l": "C5", "z": "D5", "x": "E5", "c": "F5", "v": "G5", "b": "A5", "n": "B5",
            "m": "C6",
            "!": "C#1", "@": "D#1", "$": "F#1", "%": "G#1", "^": "A#1",
            "*": "C#2", "(": "D#2", "I": "F#2", "O": "G#2", "P": "A#2",
            "T": "C#3", "Y": "D#3", "S": "F#3", "D": "G#3", "G": "A#3",
            "H": "C#4", "J": "D#4", "L": "F#4", "Z": "G#4", "C": "A#4",
            "V": "C#5", "B": "D#5", "N": "F#5", "M": "G#5", ">": "A#5"
        };

        const pitchToChar = {};
        Object.entries(keyMapData).forEach(([char, pitch]) => { pitchToChar[pitch] = char; });

        // --- Audio Engine ---
        const sampler = new Tone.Sampler({
            urls: {
                A0: "A0.mp3", C1: "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", A1: "A1.mp3",
                C2: "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", A2: "A2.mp3",
                C3: "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", A3: "A3.mp3",
                C4: "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", A4: "A4.mp3",
                C5: "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", A5: "A5.mp3",
                C6: "C6.mp3"
            },
            release: 1.2,
            baseUrl: "https://tonejs.github.io/audio/salamander/"
        }).toDestination();

        // --- Core Variables ---
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const midiInput = document.getElementById('midiInput');
        const playBtn = document.getElementById('playBtn');
        const resultArea = document.getElementById('resultArea');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const durationDisplay = document.getElementById('durationDisplay');
        const waitMessage = document.getElementById('waitMessage');
        const targetKeysContainer = document.getElementById('targetKeysContainer');

        const speedInput = document.getElementById('speed');
        const transposeInput = document.getElementById('transpose');
        const zoomInput = document.getElementById('zoom');

        let currentMidi = null;
        let isPlaying = false;
        let isPracticeMode = true;
        let startTime = 0;
        let pauseTime = 0;
        let lerpTime = 0; // Smooth movement
        let animationId = null;
        let midiNotes = [];
        let activeKeys = new Set(); // Currently pressed keys
        let pendingChord = []; // Notes that must be hit to advance

        function resize() {
            canvas.width = canvas.parentElement.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.parentElement.clientHeight * window.devicePixelRatio;
            if (!isPlaying) draw(pauseTime);
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Logic: Chord Detection ---
        function getChordAt(time) {
            // Find notes at roughly the same time (within 0.1s)
            const threshold = 0.1;
            const currentChord = midiNotes.filter(n =>
                Math.abs(n.time - time) < threshold && !n.played
            );
            return currentChord;
        }

        // --- Playback/Animate ---
        function animate() {
            if (!isPlaying) return;

            const speed = parseFloat(speedInput.value);
            let targetTime;

            if (isPracticeMode) {
                targetTime = pauseTime;
                pendingChord = getChordAt(targetTime);

                if (pendingChord.length > 0) {
                    // Check if all keys in chord are pressed
                    const allHit = pendingChord.every(note => activeKeys.has(note.char));

                    if (allHit) {
                        pendingChord.forEach(n => n.played = true);
                        waitMessage.classList.add('hidden');
                        // Find next note time or advance naturally
                        const nextRemaining = midiNotes.find(n => !n.played && n.time > targetTime);
                        if (nextRemaining) {
                            pauseTime = nextRemaining.time;
                        } else {
                            pauseTime += (0.016 * speed);
                        }
                    } else {
                        // Display needed keys
                        waitMessage.classList.remove('hidden');
                        updateTargetKeysUI(pendingChord);
                    }
                } else {
                    waitMessage.classList.add('hidden');
                    pauseTime += (0.016 * speed);
                }
            } else {
                const now = performance.now() / 1000;
                targetTime = (now - startTime) * speed;

                midiNotes.forEach(note => {
                    if (!note.played && note.time <= targetTime) {
                        sampler.triggerAttackRelease(note.pitch, note.duration);
                        note.played = true;
                    }
                });
            }

            // Smoothly move the camera
            lerpTime += (targetTime - lerpTime) * 0.15;
            draw(lerpTime);

            if (currentMidi && lerpTime > currentMidi.duration + 1) {
                stopPlayback();
            } else {
                animationId = requestAnimationFrame(animate);
            }
        }

        function updateTargetKeysUI(chord) {
            targetKeysContainer.innerHTML = '';
            // Get unique keys in the chord
            const uniqueKeys = [...new Set(chord.map(n => n.char))];
            uniqueKeys.forEach(char => {
                const badge = document.createElement('div');
                badge.className = `key-badge ${activeKeys.has(char) ? 'active' : ''}`;
                badge.innerText = char.toUpperCase();
                targetKeysContainer.appendChild(badge);
            });
        }

        // --- Interaction ---
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const key = e.key;
            const pitch = keyMapData[key];
            if (!pitch) return;

            activeKeys.add(key);
            sampler.triggerAttackRelease(pitch, "4n");

            // Re-render immediate visual feedback
            if (isPracticeMode) {
                if (pendingChord.length > 0) updateTargetKeysUI(pendingChord);
                draw(lerpTime);
            }
        });

        window.addEventListener('keyup', (e) => {
            activeKeys.delete(e.key);
            if (isPracticeMode) {
                if (pendingChord.length > 0) updateTargetKeysUI(pendingChord);
                draw(lerpTime);
            }
        });

        // --- Rendering Core ---
        function draw(currentTime) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const zoom = parseFloat(zoomInput.value);
            const speed = parseFloat(speedInput.value);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // UI Updates
            if (currentMidi) {
                const percent = (currentTime / currentMidi.duration) * 100;
                progressBar.style.width = `${Math.min(100, percent)}%`;
                timeDisplay.innerText = formatTime(currentTime);
            }

            drawGrid(currentTime, zoom, speed, centerX);

            if (midiNotes.length === 0) return;

            // 세로 음역대 자동 스케일링 (전체 높이가 보이도록)
            const minMidi = Math.min(...midiNotes.map(n => n.midi));
            const maxMidi = Math.max(...midiNotes.map(n => n.midi));
            const range = Math.max(24, maxMidi - minMidi + 10);
            const noteHeight = (canvas.height * 0.7) / range;
            const midiCenter = (minMidi + maxMidi) / 2;

            midiNotes.forEach(note => {
                const xOffset = (note.time - currentTime) * zoom * speed;
                const x = centerX + xOffset;
                const y = centerY - (note.midi - midiCenter) * noteHeight;

                if (x > -zoom && x < canvas.width + zoom) {
                    const isHitting = Math.abs(xOffset) < 5;
                    const isPressed = activeKeys.has(note.char) && isHitting;
                    const alpha = Math.max(0, 1 - Math.abs(xOffset) / (canvas.width / 1.2));

                    // Style
                    if (isHitting) {
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = isPressed ? "#34d399" : "#10b981";
                    }

                    if (note.played && note.time < currentTime - 0.1) {
                        ctx.fillStyle = `rgba(16, 185, 129, ${alpha * 0.15})`;
                    } else if (isHitting) {
                        ctx.fillStyle = isPressed ? '#ffffff' : '#10b981';
                    } else {
                        ctx.fillStyle = `rgba(30, 41, 59, ${alpha * 0.8})`;
                    }

                    const width = Math.max(15, note.duration * zoom * speed);
                    drawRoundedRect(ctx, x, y - (noteHeight * 0.4), width, noteHeight * 0.8, 6);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // Text
                    if (alpha > 0.5) {
                        ctx.font = `${isHitting ? 'bold 12px' : '10px'} JetBrains Mono`;
                        ctx.fillStyle = isHitting ? (isPressed ? '#020617' : '#fff') : `rgba(148, 163, 184, ${alpha * 0.6})`;
                        ctx.textAlign = "center";
                        ctx.fillText(note.char.toUpperCase(), x + 12, y + 4);
                    }
                }
            });

            // Center Guide Line
            const gradient = ctx.createLinearGradient(centerX, 0, centerX, canvas.height);
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(0.5, 'rgba(16, 185, 129, 0.4)');
            gradient.addColorStop(1, 'transparent');
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height);
            ctx.stroke();
        }

        function drawGrid(currentTime, zoom, speed, centerX) {
            const step = 1;
            const startSec = Math.floor((currentTime - (centerX / (zoom * speed))) / step) * step;
            const endSec = Math.ceil((currentTime + (centerX / (zoom * speed))) / step) * step;

            ctx.lineWidth = 1;
            for (let s = startSec; s <= endSec; s += step) {
                const x = centerX + (s - currentTime) * zoom * speed;
                ctx.strokeStyle = "rgba(51, 65, 85, 0.15)";
                ctx.beginPath();
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
        }

        function drawRoundedRect(ctx, x, y, width, height, radius) {
            if (width < radius * 2) radius = width / 2;
            if (height < radius * 2) radius = height / 2;
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // --- Helpers ---
        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = Math.floor(sec % 60).toString().padStart(2, '0');
            const ms = Math.floor((sec % 1) * 1000).toString().padStart(3, '0');
            return `${m}:${s}.${ms}`;
        }

        function midiToPitch(midi) {
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            return notes[midi % 12] + (Math.floor(midi / 12) - 1);
        }

        function processMidi() {
            if (!currentMidi) return;
            const transpose = parseInt(transposeInput.value);
            midiNotes = [];
            currentMidi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    const transMidi = note.midi + transpose;
                    const pitch = midiToPitch(transMidi);
                    midiNotes.push({
                        time: note.time,
                        duration: note.duration,
                        midi: transMidi,
                        pitch: pitch,
                        char: pitchToChar[pitch] || "?",
                        played: false
                    });
                });
            });
            midiNotes.sort((a, b) => a.time - b.time);
            resultArea.innerText = midiNotes.map(n => n.char).join("");
            durationDisplay.innerText = formatTime(currentMidi.duration);
        }

        // --- Controls ---
        midiInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
                currentMidi = new Midi(event.target.result);
                processMidi();
                resetPlayback();
            };
            reader.readAsArrayBuffer(file);
        });

        playBtn.onclick = () => {
            if (!currentMidi) return;
            Tone.start();
            if (isPlaying) {
                if (!isPracticeMode) pauseTime = lerpTime;
                stopPlayback();
            } else {
                isPlaying = true;
                if (!isPracticeMode) startTime = (performance.now() / 1000) - (pauseTime / parseFloat(speedInput.value));
                playBtn.innerHTML = '<svg class="w-6 h-6 fill-white" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
                animate();
            }
        };

        function stopPlayback() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            playBtn.innerHTML = '<svg class="w-6 h-6 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
            waitMessage.classList.add('hidden');
        }

        function resetPlayback() {
            stopPlayback();
            pauseTime = 0;
            lerpTime = 0;
            midiNotes.forEach(n => n.played = false);
            draw(0);
        }

        modeAuto.onclick = () => {
            isPracticeMode = false;
            modeAuto.className = "flex-1 py-2 rounded-lg text-[10px] font-bold bg-emerald-500 text-white shadow-lg";
            modePractice.className = "flex-1 py-2 rounded-lg text-[10px] font-bold text-slate-400";
            document.getElementById('modeDisplay').innerText = "AUTO MODE: FLOWING";
            if (isPlaying) startTime = (performance.now() / 1000) - (lerpTime / parseFloat(speedInput.value));
        };

        modePractice.onclick = () => {
            isPracticeMode = true;
            modePractice.className = "flex-1 py-2 rounded-lg text-[10px] font-bold bg-emerald-500 text-white shadow-lg";
            modeAuto.className = "flex-1 py-2 rounded-lg text-[10px] font-bold text-slate-400";
            document.getElementById('modeDisplay').innerText = "PRACTICE MODE: CHORD WAIT";
            pauseTime = lerpTime;
        };

        // Inputs
        speedInput.oninput = (e) => {
            document.getElementById('speedVal').innerText = e.target.value + 'x';
            if (isPlaying && !isPracticeMode) {
                startTime = (performance.now() / 1000) - (lerpTime / parseFloat(e.target.value));
            }
        };
        transposeInput.oninput = (e) => {
            document.getElementById('transVal').innerText = e.target.value;
            processMidi();
            draw(lerpTime);
        };
        zoomInput.oninput = (e) => {
            document.getElementById('zoomVal').innerText = e.target.value;
            draw(lerpTime);
        };

        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(resultArea.innerText);
            const b = document.getElementById('copyBtn');
            b.innerText = "COPIED!";
            setTimeout(() => b.innerText = "COPY", 2000);
        };

        timeline.onmousedown = (e) => {
            if (!currentMidi) return;
            const rect = timeline.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const newTime = percent * currentMidi.duration;
            pauseTime = newTime;
            lerpTime = newTime;
            midiNotes.forEach(n => n.played = n.time < newTime);
            if (isPlaying && !isPracticeMode) {
                startTime = (performance.now() / 1000) - (newTime / parseFloat(speedInput.value));
            }
            draw(newTime);
        };
    </script>
</body>

</html>
